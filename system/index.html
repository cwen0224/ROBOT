<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROBOT Motion Node Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">Live2D / Motion3</div>
        <h1>ROBOT 節點式表情編輯器</h1>
        <p class="subtitle">匯入 expressions，拖曳節點到時間軸，系統會在每個時間點把參數加總後輸出成 MOTION3。</p>
      </div>
      <div class="topbar-actions">
        <label class="btn">
          匯入資料夾
          <input id="folderInput" type="file" webkitdirectory multiple hidden />
        </label>
        <label class="btn secondary">
          匯入檔案
          <input id="fileInput" type="file" multiple hidden accept=".json,.motion3.json,.exp3.json" />
        </label>
        <button id="exportBtn" class="btn primary" type="button">匯出 MOTION3</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel library-panel">
        <div class="panel-header">
          <div>
            <h2>表情庫</h2>
            <p>從 `expressions` 讀入的預設節點。</p>
          </div>
        </div>
        <label class="search">
          <span>搜尋</span>
          <input id="librarySearch" type="search" placeholder="輸入表情或參數名稱" />
        </label>
        <div class="stat-grid">
          <div class="stat">
            <span>表情數</span>
            <strong id="exprCount">0</strong>
          </div>
          <div class="stat">
            <span>參數數</span>
            <strong id="paramCount">0</strong>
          </div>
          <div class="stat">
            <span>節點數</span>
            <strong id="nodeCount">0</strong>
          </div>
          <div class="stat">
            <span>輸出長度</span>
            <strong id="durationLabel">0.00s</strong>
          </div>
        </div>
        <div id="libraryList" class="library-list"></div>
      </aside>

      <section class="workspace">
        <div class="timeline-panel panel">
          <div class="panel-header">
            <div>
              <h2>時間軸節點</h2>
              <p>拖曳節點的標題列來改變開始時間與位置，選取後可在右側調整參數。</p>
            </div>
            <div class="timeline-tools">
              <label>
                FPS
                <input id="fpsInput" type="number" min="1" max="120" step="1" value="60" />
              </label>
              <label>
                播放頭
                <input id="playheadInput" type="range" min="0" max="10" step="0.01" value="0" />
              </label>
            </div>
          </div>
          <div class="ruler" id="ruler"></div>
          <div id="stage" class="stage">
            <div id="playhead" class="playhead"></div>
          </div>
        </div>
      </section>

      <aside class="panel inspector-panel">
        <div class="panel-header">
          <div>
            <h2>屬性</h2>
            <p>選取一個節點後可編輯它的時間、權重與參數值。</p>
          </div>
        </div>
        <div id="inspectorEmpty" class="empty-state">
          <strong>尚未選取節點</strong>
          <p>先從左側表情庫新增一個節點。</p>
        </div>
        <div id="inspector" class="inspector hidden">
          <div class="field">
            <label>名稱</label>
            <input id="nodeName" type="text" />
          </div>
          <div class="field-row">
            <label class="field">
              <span>開始(s)</span>
              <input id="nodeStart" type="number" min="0" step="0.01" />
            </label>
            <label class="field">
              <span>持續(s)</span>
              <input id="nodeDuration" type="number" min="0.01" step="0.01" />
            </label>
          </div>
          <div class="field-row">
            <label class="field">
              <span>權重</span>
              <input id="nodeStrength" type="number" step="0.05" />
            </label>
            <label class="field">
              <span>淡入(s)</span>
              <input id="nodeFadeIn" type="number" min="0" step="0.01" />
            </label>
          </div>
          <div class="field-row">
            <label class="field">
              <span>淡出(s)</span>
              <input id="nodeFadeOut" type="number" min="0" step="0.01" />
            </label>
            <label class="field checkbox">
              <input id="nodeEnabled" type="checkbox" />
              <span>啟用</span>
            </label>
          </div>
          <div class="field-row">
            <button id="duplicateBtn" class="btn secondary" type="button">複製節點</button>
            <button id="deleteBtn" class="btn danger" type="button">刪除節點</button>
          </div>
          <div class="param-editor">
            <div class="param-editor-header">
              <h3>參數清單</h3>
              <span id="nodeMeta"></span>
            </div>
            <div id="paramList" class="param-list"></div>
          </div>
        </div>

        <div class="output-panel">
          <div class="panel-header compact">
            <div>
              <h2>預覽與輸出</h2>
              <p>播放頭位置的加總結果會顯示在這裡。</p>
            </div>
          </div>
          <div id="playheadSummary" class="summary"></div>
          <div class="field-row">
            <button id="copyJsonBtn" class="btn secondary" type="button">複製 JSON</button>
            <button id="downloadJsonBtn" class="btn primary" type="button">下載檔案</button>
          </div>
          <label class="field">
            <span>輸出檔名</span>
            <input id="outputName" type="text" value="generated.motion3.json" />
          </label>
          <label class="field">
            <span>輸出預覽</span>
            <textarea id="exportPreview" rows="12" readonly></textarea>
          </label>
        </div>
      </aside>
    </main>
  </div>

  <template id="libraryCardTemplate">
    <article class="library-card">
      <header>
        <div>
          <strong class="expr-name"></strong>
          <span class="expr-file"></span>
        </div>
        <button class="mini-btn add-node-btn" type="button">新增節點</button>
      </header>
      <p class="expr-summary"></p>
      <div class="chip-list"></div>
    </article>
  </template>

  <template id="nodeTemplate">
    <article class="node-card">
      <div class="node-handle">
        <strong class="node-title"></strong>
        <span class="node-time"></span>
      </div>
      <div class="node-body">
        <div class="node-badge-list"></div>
        <div class="node-mini-stats"></div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
